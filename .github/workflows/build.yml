name: build

# Builds fastm.plugin on Linux, macOS, and Windows so we ship a binary for each
# OS without owning each machine. Artifacts are downloadable from the run.
on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: linux-x86_64
          - os: macos-latest
            name: macos-universal
          - os: windows-latest
            name: windows-x86_64
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Set up MSVC (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      # Linux: build against an old glibc so the plugin loads on RHEL/older
      # systems (the runner's own glibc, ~2.39, is too new for e.g. RHEL9 2.34).
      - name: Set up zig (Linux)
        if: matrix.name == 'linux-x86_64'
        uses: mlugg/setup-zig@v1
        with:
          version: 0.13.0

      - name: Install cargo-zigbuild (Linux)
        if: matrix.name == 'linux-x86_64'
        run: cargo install --locked cargo-zigbuild

      - name: Build (Unix)
        if: runner.os != 'Windows'
        run: bash build/build.sh
        env:
          ZIG_GLIBC: ${{ matrix.name == 'linux-x86_64' && '2.17' || '' }}

      - name: Build (Windows)
        if: runner.os == 'Windows'
        run: pwsh build/build.ps1

      # Smoke test: load the freshly built plugin with a fake-Stata host and run
      # one real STM fit. On windows-latest this exercises the shipped Windows
      # binary on a real Windows loader (no Stata license needed).
      - name: Smoke test (Unix)
        if: runner.os != 'Windows'
        run: bash tests/win_smoke/run.sh fastm.plugin

      # Import guard: the Windows binary must not depend on a Visual C++ runtime
      # DLL (vcruntime140/msvcp140/msvcr*), which is absent on a clean Stata box.
      # The CRT is statically linked; this fails the build if that ever regresses.
      - name: Import guard — no VC++ runtime dependency (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $deps = dumpbin /dependents fastm.plugin | Out-String
          Write-Host $deps
          if ($deps -match '(?i)vcruntime|msvcp|msvcr\d') {
            Write-Error 'plugin imports a VC++ runtime DLL; static CRT link regressed'
            exit 1
          }

      - name: Smoke test (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: |
          cl /nologo /O2 /I vendor tests\win_smoke\host.c /Fe:host_smoke.exe
          host_smoke.exe fastm.plugin

      - uses: actions/upload-artifact@v4
        with:
          name: fastm-plugin-${{ matrix.name }}
          path: fastm.plugin
          if-no-files-found: error
